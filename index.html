<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koordinatensystem</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Koordinaten-Converter</h1>
    </header>
    <div class="container">
        <div class="hint-box">Bitte geben Sie die Koordinaten ein.</div>
        <input type="text" id="coordinates" placeholder="z.B. 50.12345, 8.12345">
        <button id="convert">Prüfen</button>
        <div id="map"></div>
        <div id="coordinate-display"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
