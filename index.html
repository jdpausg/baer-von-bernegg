<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <title>Geocache Verification</title>
    <style>
        #map { height: 400px; }
    </style>
</head>
<body>
    <h1>Geocache Verification</h1>
    <label for="coordinates">Enter Coordinates (N/S DD° MM.MMM, E/W DDD° MM.MMM):</label>
    <input type="text" id="coordinates" placeholder="N 00° 00.000, E 000° 00.000">
    <button id="verifyBtn">Verify</button>
    <button id="nextPuzzleBtn" style="display:none;" onclick="window.location.href='bear-von-bernegg-2';">Next Puzzle</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' }).addTo(map);

        document.getElementById('verifyBtn').onclick = function() {
            var coords = document.getElementById('coordinates').value;
            var regex = /^(N|S)\s(\d{1,2})°\s(\d{1,2}\.\d{1,3})\s,(E|W)\s(\d{1,3})°\s(\d{1,2}\.\d{1,3})$/;
            if (regex.test(coords)) {
                document.getElementById('nextPuzzleBtn').style.display = 'block';
            } else {
                alert('Please enter valid coordinates.');
            }
        };
    </script>
</body>
</html>
